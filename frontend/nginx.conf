# ════════════════════════════════════════════════════════════════
# nginx.conf — Frontend Web Server Configuration
# ════════════════════════════════════════════════════════════════
#
# Nginx is a very fast, lightweight web server.
# It does THREE things for us:
#
#  1. SERVE static files  → HTML, CSS, JS, images from /dist
#  2. SPA routing         → All URLs return index.html
#                           (React Router handles the rest)
#  3. API PROXY           → /api/* requests forwarded to backend
#                           (avoids CORS issues)
#
# ┌──────────────────────────────────────────────────────────┐
# │  Browser → nginx:80                                       │
# │    /            → serve index.html (React app loads)     │
# │    /dashboard   → serve index.html (React Router)        │
# │    /api/v1/...  → proxy to backend:8080                  │
# │    /hubs/...    → proxy to backend:8080 (SignalR WS)     │
# └──────────────────────────────────────────────────────────┘

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── GZIP Compression ────────────────────────────────────
    # Compress responses before sending to browser.
    # Reduces file size by ~70% → faster page loads.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options           "DENY"                      always;
    add_header X-Content-Type-Options    "nosniff"                   always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=()"  always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss:;"
        always;

    # ── Static Files with Caching ────────────────────────────
    # Assets with content hash in filename → cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files → no cache (always get the latest index.html)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health check endpoint (used by Docker/Azure) ─────────
    location /health.html {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ── API Proxy → Backend ───────────────────────────────────
    # Forwards /api/* requests to the backend container.
    # "backend" is the service name in docker-compose.yml
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_buffering    off;
    }

    # ── SignalR WebSocket Proxy ───────────────────────────────
    # SignalR uses WebSockets. nginx must upgrade the connection.
    location /hubs/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";      # Capital U required!
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;  # Keep WebSocket alive for 1 hour
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── React Router (SPA) ───────────────────────────────────
    # For any route not found as a file, serve index.html.
    # React Router then reads the URL and renders the correct page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Error Pages ──────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
